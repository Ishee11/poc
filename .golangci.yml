version: "2"

linters:
  default: none
  enable:
    - govet
    - ineffassign
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godot
          - paralleltest
        path: integration-test
      - linters:
          - godot
        path: internal/controller/http
    paths:
      - bin/
      - third_party$
      - builtin$
      - examples$

formatters:
  enable: []
