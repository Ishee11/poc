<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Poker Session Control</title>

        <link rel="stylesheet" href="/static/css/main.css" />
    </head>

    <body>
        <div class="app">
            <!-- HERO -->
            <section class="hero">
                <h1>Poker Session Control</h1>
                <p>Control panel for poker cash games.</p>
            </section>

            <main class="layout">
                <!-- ================= LOBBY ================= -->
                <section class="screen active" id="screen-lobby">
                    <div class="grid two">
                        <div class="panel">
                            <h2>Connect to Active Session</h2>

                            <!-- 👇 добавили prevent submit -->
                            <form
                                id="connect-session-form"
                                onsubmit="return false;"
                            >
                                <select id="active-session-select">
                                    <option value="">
                                        Latest active session
                                    </option>
                                </select>

                                <div class="actions">
                                    <button
                                        type="button"
                                        id="open-workspace-btn"
                                        class="secondary"
                                    >
                                        Open Workspace
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="panel">
                            <h2>Start a New Session</h2>

                            <!-- 👇 тоже защита -->
                            <form
                                id="start-session-form"
                                onsubmit="return false;"
                            >
                                <label>
                                    Chip Rate
                                    <input
                                        id="start-chip-rate"
                                        type="number"
                                        min="1"
                                        value="2"
                                    />
                                </label>

                                <div class="hint" id="next-session-id-hint">
                                    Next session ID: -
                                </div>

                                <div class="actions">
                                    <button type="submit">Start Session</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>Sessions</h3>
                        <div id="overview-sessions-wrap"></div>
                    </div>
                </section>

                <!-- ================= SESSION ================= -->
                <section class="screen" id="screen-session">
                    <div class="panel">
                        <h2 id="workspace-title">Session</h2>

                        <div class="stats">
                            <div class="stat">
                                <div class="stat-label">Chip Rate</div>
                                <div id="stat-chip-rate">-</div>
                            </div>

                            <div class="stat">
                                <div class="stat-label">Total Buy In</div>
                                <div id="stat-buy-in">-</div>
                            </div>

                            <div class="stat">
                                <div class="stat-label">Total Cash Out</div>
                                <div id="stat-cash-out">-</div>
                            </div>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>Players</h3>
                        <div id="players-wrap"></div>
                    </div>

                    <div class="panel">
                        <h3>Actions</h3>

                        <div class="form-row">
                            <input
                                id="action-player-id"
                                placeholder="Player ID"
                            />
                            <input
                                id="action-chips"
                                type="number"
                                placeholder="Chips"
                            />
                        </div>

                        <div class="actions">
                            <button id="buy-in-btn">Buy In</button>
                            <button id="cash-out-btn" class="secondary">
                                Cash Out
                            </button>
                        </div>
                    </div>

                    <div class="panel">
                        <h3>Operations</h3>
                        <div id="operations-wrap"></div>
                    </div>
                </section>

                <!-- ================= PLAYER ================= -->
                <section class="screen" id="screen-player">
                    <div class="panel">
                        <h2 id="player-screen-title">Player</h2>
                        <div id="player-screen-id"></div>
                    </div>

                    <div class="panel">
                        <div id="player-detail-wrap" class="empty">
                            Player data will appear here
                        </div>
                    </div>
                </section>
            </main>
        </div>

        <script type="module" src="/static/js/app.js"></script>
    </body>
</html>
