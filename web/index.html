<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Poker API UI</title>
        <style>
            body {
                font-family: Arial;
                max-width: 800px;
                margin: 20px auto;
            }
            h2 {
                margin-top: 30px;
            }
            input,
            button {
                margin: 5px;
                padding: 5px;
            }
            pre {
                background: #f5f5f5;
                padding: 10px;
            }
        </style>
    </head>
    <body>
        <h1>Poker API Debug UI</h1>

        <h2>Start Session</h2>
        <input id="start_session_id" placeholder="session_id" />
        <input id="start_chip_rate" placeholder="chip_rate" />
        <button onclick="startSession()">Start</button>

        <h2>Buy In</h2>
        <input id="buy_req" placeholder="request_id" />
        <input id="buy_session" placeholder="session_id" />
        <input id="buy_player" placeholder="player_id" />
        <input id="buy_chips" placeholder="chips" />
        <button onclick="buyIn()">Buy In</button>

        <h2>Cash Out</h2>
        <input id="cash_req" placeholder="request_id" />
        <input id="cash_session" placeholder="session_id" />
        <input id="cash_player" placeholder="player_id" />
        <input id="cash_chips" placeholder="chips" />
        <button onclick="cashOut()">Cash Out</button>

        <h2>Finish Session</h2>
        <input id="finish_session" placeholder="session_id" />
        <button onclick="finishSession()">Finish</button>

        <h2>Reverse Operation</h2>
        <input id="rev_req" placeholder="request_id" />
        <input id="rev_op" placeholder="operation_id" />
        <input id="rev_target" placeholder="target_operation_id" />
        <button onclick="reverseOp()">Reverse</button>

        <h2>Get Session</h2>
        <input id="get_session" placeholder="session_id" />
        <button onclick="getSession()">Get</button>

        <h2>Get Operations</h2>
        <input id="ops_session" placeholder="session_id" />
        <input id="ops_limit" placeholder="limit" />
        <input id="ops_offset" placeholder="offset" />
        <button onclick="getOps()">Get Ops</button>

        <h2>Get Results</h2>
        <input id="res_session" placeholder="session_id" />
        <button onclick="getResults()">Get Results</button>

        <h2>Response</h2>
        <pre id="output"></pre>

        <script>
            const API = "http://localhost:8080";

            function show(res) {
                document.getElementById("output").textContent = res;
            }

            async function post(path, body) {
                const res = await fetch(API + path, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });

                const text = await res.text();
                show(res.status + "\n" + text);
            }

            async function get(path) {
                const res = await fetch(API + path);
                const text = await res.text();
                show(res.status + "\n" + text);
            }

            function startSession() {
                post("/session/start", {
                    session_id: val("start_session_id"),
                    chip_rate: Number(val("start_chip_rate")),
                });
            }

            function buyIn() {
                post("/buy-in", {
                    request_id: val("buy_req"),
                    session_id: val("buy_session"),
                    player_id: val("buy_player"),
                    chips: Number(val("buy_chips")),
                });
            }

            function cashOut() {
                post("/cash-out", {
                    request_id: val("cash_req"),
                    session_id: val("cash_session"),
                    player_id: val("cash_player"),
                    chips: Number(val("cash_chips")),
                });
            }

            function finishSession() {
                post("/session/finish", {
                    session_id: val("finish_session"),
                });
            }

            function reverseOp() {
                post("/operation/reverse", {
                    request_id: val("rev_req"),
                    operation_id: val("rev_op"),
                    target_operation_id: val("rev_target"),
                });
            }

            function getSession() {
                get(`/session?session_id=${val("get_session")}`);
            }

            function getOps() {
                get(
                    `/session/operations?session_id=${val("ops_session")}&limit=${val("ops_limit")}&offset=${val("ops_offset")}`,
                );
            }

            function getResults() {
                get(`/session/results?session_id=${val("res_session")}`);
            }

            function val(id) {
                return document.getElementById(id).value;
            }
        </script>
    </body>
</html>
