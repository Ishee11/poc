services:
  prometheus:
    image: prom/prometheus:v3.4.2
    restart: unless-stopped
    depends_on:
      - alertmanager
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT_BIND:-127.0.0.1:9090:9090}"
    volumes:
      - ./deploy/observability/prometheus/${PROMETHEUS_CONFIG_FILE:-prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  alertmanager:
    image: prom/alertmanager:v0.32.1
    restart: unless-stopped
    env_file:
      - .env.observability
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --config.expand-env
      - --storage.path=/alertmanager
    ports:
      - "${ALERTMANAGER_PORT_BIND:-127.0.0.1:9093:9093}"
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - .env.observability
    ports:
      - "${GRAFANA_PORT_BIND:-3000:3000}"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

volumes:
  alertmanager_data:
  prometheus_data:
  grafana_data:
