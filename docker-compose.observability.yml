services:
  prometheus:
    image: prom/prometheus:v3.4.2
    container_name: poker-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:12.0.2
    container_name: poker-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    env_file:
      - .env.observability
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

volumes:
  prometheus_data:
  grafana_data:
