name: Deploy Dev

on:
  push:
    branches: ["dev"]

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/ishee11/poc
      IMAGE_TAG: dev-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS (dev)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "== Disk before deploy =="
            df -h
            docker system df || true

            echo "== Pull project =="
            if [ ! -d /app-dev/.git ]; then
              git clone --depth 1 -b dev https://github.com/Ishee11/poc.git /app-dev
            else
              git -C /app-dev fetch --depth 1 origin dev
              git -C /app-dev reset --hard origin/dev
              git -C /app-dev clean -fd
            fi
            cd /app-dev

            test -f docker-compose.dev.yml
            test -f docker-compose.observability.yml
            test -f deploy/observability/prometheus/prometheus.yml
            test -f deploy/observability/prometheus/alerts.yml
            test -f deploy/observability/alertmanager/alertmanager.yml

            echo "== Write observability env =="
            printf '%s\n' \
              "GF_SECURITY_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}" \
              "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
              "GF_SERVER_DOMAIN=193.238.134.58" \
              "GF_SERVER_ROOT_URL=http://193.238.134.58:3000" \
              "GF_AUTH_ANONYMOUS_ENABLED=false" \
              "GF_USERS_ALLOW_SIGN_UP=false" \
              "PROMETHEUS_CONFIG_FILE=prometheus.yml" \
              "PROMETHEUS_PORT_BIND=127.0.0.1:9090:9090" \
              "ALERTMANAGER_PORT_BIND=127.0.0.1:9093:9093" \
              "GRAFANA_PORT_BIND=3000:3000" \
              "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" \
              "TELEGRAM_SEND_RESOLVED=${{ secrets.TELEGRAM_SEND_RESOLVED }}" \
              > .env.observability
            chmod 600 .env.observability

            echo "== Write app env =="
            printf '%s\n' \
              "APP_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
              "AUTH_SEED_ADMIN_EMAIL=${{ secrets.AUTH_SEED_ADMIN_EMAIL }}" \
              "AUTH_SEED_ADMIN_PASSWORD=${{ secrets.AUTH_SEED_ADMIN_PASSWORD }}" \
              "AUTH_SEED_USER_EMAIL=${{ secrets.AUTH_SEED_USER_EMAIL }}" \
              "AUTH_SEED_USER_PASSWORD=${{ secrets.AUTH_SEED_USER_PASSWORD }}" \
              "APP_ORIGIN=http://193.238.134.58:18080" \
              "PUSH_ENABLED=false" \
              "PUSH_SUBJECT=${{ secrets.PUSH_SUBJECT }}" \
              "PUSH_VAPID_PUBLIC_KEY=${{ secrets.PUSH_VAPID_PUBLIC_KEY }}" \
              "PUSH_VAPID_PRIVATE_KEY=${{ secrets.PUSH_VAPID_PRIVATE_KEY }}" \
              > .env.app
            chmod 600 .env.app

            echo "== Validate observability env =="
            test -s .env.observability
            grep -E '^(GF_SECURITY_ADMIN_USER|GF_SERVER_ROOT_URL|TELEGRAM_CHAT_ID)=' .env.observability

            echo "== Check docker cache pressure =="
            available_kb=$(df --output=avail / | tail -n 1 | tr -d ' ')
            min_available_kb=$((3 * 1024 * 1024))

            if [ "$available_kb" -lt "$min_available_kb" ]; then
              echo "Low disk space: ${available_kb}KB available. Pruning docker build cache."
              docker builder prune -af || true
            else
              echo "Keeping docker build cache: ${available_kb}KB available."
            fi

            echo "== Log in to GHCR =="
            printf '%s' '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            echo "== Pull app image =="
            docker compose --env-file .env.app -p poker-dev -f docker-compose.dev.yml -f docker-compose.registry.yml pull app

            echo "== Start dev postgres =="
            docker compose -p poker-dev -f docker-compose.dev.yml up -d db

            echo "== Wait for dev postgres =="
            ready=0

            for i in {1..20}; do
              if docker exec poker-db-dev pg_isready -U poker; then
                echo "Dev postgres is ready"
                ready=1
                break
              fi

              echo "Waiting for dev postgres..."
              sleep 2
            done

            if [ "$ready" != "1" ]; then
              echo "Dev postgres is not ready"
              docker logs poker-db-dev --tail=100 || true
              exit 1
            fi

            echo "== Copy prod database to dev =="
            docker exec poker-db-dev psql -U poker -d poker -v ON_ERROR_STOP=1 -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
            docker exec poker-db pg_dump -U poker -d poker -Fc --no-owner --no-privileges \
              | docker exec -i poker-db-dev pg_restore \
                  --no-owner \
                  --no-privileges \
                  --single-transaction \
                  -U poker \
                  -d poker

            echo "== Start dev app =="
            docker compose --env-file .env.app -p poker-dev -f docker-compose.dev.yml -f docker-compose.registry.yml up -d --no-build --force-recreate app

            echo "== Start observability stack =="
            docker compose --env-file .env.observability -p poker-dev-obs -f docker-compose.observability.yml down --remove-orphans || true
            docker compose --env-file .env.observability -p poker-obs -f docker-compose.observability.yml down --remove-orphans || true
            docker compose --env-file .env.observability -p poker-dev-obs -f docker-compose.observability.yml up -d

            echo "== Check dev app logs =="
            sleep 3
            docker logs poker-app-dev --tail=50 || true

            echo "== Check observability containers =="
            docker ps --filter name=poker-prometheus
            docker ps --filter name=poker-grafana
            docker ps --filter name=poker-alertmanager

            echo "== Check observability containers =="
            docker compose --env-file .env.observability -p poker-dev-obs -f docker-compose.observability.yml ps

            echo "== Disk after deploy =="
            df -h
            docker system df || true

            echo "== Done =="
