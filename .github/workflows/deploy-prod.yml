name: Deploy Prod

on:
  push:
    branches: ["master"]

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy to VPS (prod)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            echo "== Disk before deploy =="
            df -h
            docker system df

            echo "== Pull project =="
            rm -rf /app
            git clone -b master https://github.com/Ishee11/poc.git /app
            cd /app
            test -f docker-compose.observability.yml
            test -f deploy/observability/prometheus/prometheus.prod.yml
            test -f deploy/observability/prometheus/alerts.yml
            test -f deploy/observability/alertmanager/alertmanager.yml

            echo "== Write observability env =="
            printf '%s\n' \
              "GF_SECURITY_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}" \
              "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
              "GF_SERVER_DOMAIN=193.238.134.58" \
              "GF_SERVER_ROOT_URL=http://193.238.134.58:3001" \
              "GF_AUTH_ANONYMOUS_ENABLED=false" \
              "GF_USERS_ALLOW_SIGN_UP=false" \
              "PROMETHEUS_CONFIG_FILE=prometheus.prod.yml" \
              "PROMETHEUS_PORT_BIND=127.0.0.1:9091:9090" \
              "ALERTMANAGER_PORT_BIND=127.0.0.1:9094:9093" \
              "GRAFANA_PORT_BIND=3001:3000" \
              "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" \
              "TELEGRAM_SEND_RESOLVED=${{ secrets.TELEGRAM_SEND_RESOLVED }}" \
              > .env.observability
            chmod 600 .env.observability

            echo "== Prune docker build cache =="
            docker builder prune -af || true

            echo "== Build & start prod containers =="
            docker compose -f docker-compose.yml up -d --build --force-recreate

            echo "== Wait for prod postgres =="
            for i in {1..10}; do
              if docker exec poker-db pg_isready -U poker; then
                echo "Prod postgres is ready"
                break
              fi
              echo "Waiting for prod postgres..."
              sleep 2
            done

            echo "== Check prod app logs =="
            sleep 3
            docker logs poker-app --tail=50

            echo "== Start prod observability stack =="
            docker compose --env-file .env.observability -p poker-prod-obs -f docker-compose.observability.yml up -d

            echo "== Check prod observability containers =="
            docker compose --env-file .env.observability -p poker-prod-obs -f docker-compose.observability.yml ps

            echo "== Disk after deploy =="
            df -h
            docker system df

            echo "== Done =="
