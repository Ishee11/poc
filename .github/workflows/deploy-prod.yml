name: Deploy Prod

on:
  push:
    branches: ["master"]

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/ishee11/poc
      IMAGE_TAG: master-${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to VPS (prod)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "== Disk before deploy =="
            df -h
            docker system df || true

            echo "== Pull project =="
            if [ ! -d /app/.git ]; then
              git clone --depth 1 -b master https://github.com/Ishee11/poc.git /app
            else
              git -C /app fetch --depth 1 origin master
              git -C /app reset --hard origin/master
              git -C /app clean -fd
            fi
            cd /app

            echo "== Write app env =="
            printf '%s\n' \
              "APP_IMAGE=${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
              "AUTH_SEED_ADMIN_EMAIL=${{ secrets.AUTH_SEED_ADMIN_EMAIL }}" \
              "AUTH_SEED_ADMIN_PASSWORD=${{ secrets.AUTH_SEED_ADMIN_PASSWORD }}" \
              "AUTH_SEED_USER_EMAIL=${{ secrets.AUTH_SEED_USER_EMAIL }}" \
              "AUTH_SEED_USER_PASSWORD=${{ secrets.AUTH_SEED_USER_PASSWORD }}" \
              "APP_ORIGIN=https://semenovv.space" \
              "PUSH_ENABLED=${{ secrets.PUSH_ENABLED }}" \
              "PUSH_SUBJECT=${{ secrets.PUSH_SUBJECT }}" \
              "PUSH_VAPID_PUBLIC_KEY=${{ secrets.PUSH_VAPID_PUBLIC_KEY }}" \
              "PUSH_VAPID_PRIVATE_KEY=${{ secrets.PUSH_VAPID_PRIVATE_KEY }}" \
              > .env.app
            chmod 600 .env.app

            echo "== Check docker cache pressure =="
            available_kb=$(df --output=avail / | tail -n 1 | tr -d ' ')
            min_available_kb=$((3 * 1024 * 1024))
            if [ "$available_kb" -lt "$min_available_kb" ]; then
              echo "Low disk space: ${available_kb}KB available. Pruning docker build cache."
              docker builder prune -af || true
            else
              echo "Keeping docker build cache: ${available_kb}KB available."
            fi

            echo "== Log in to GHCR =="
            printf '%s' '${{ github.token }}' | docker login ghcr.io -u '${{ github.actor }}' --password-stdin

            echo "== Pull app image =="
            docker compose --env-file .env.app -f docker-compose.yml -f docker-compose.registry.yml pull app

            echo "== Start prod containers =="
            docker compose --env-file .env.app -f docker-compose.yml -f docker-compose.registry.yml up -d --no-build --force-recreate

            echo "== Wait for prod postgres =="
            for i in {1..10}; do
              if docker exec poker-db pg_isready -U poker; then
                echo "Prod postgres is ready"
                break
              fi
              echo "Waiting for prod postgres..."
              sleep 2
            done

            echo "== Check prod app logs =="
            sleep 3
            docker logs poker-app --tail=50

            echo "== Wait for prod app health =="
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
                echo "Prod app is healthy"
                break
              fi
              echo "Waiting for prod app health..."
              sleep 3
            done

            echo "== Disk after deploy =="
            df -h
            docker system df || true

            echo "== Done =="
