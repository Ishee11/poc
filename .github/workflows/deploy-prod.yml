name: Deploy Prod

on:
  push:
    branches: ["master"]

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy to VPS (prod)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            echo "== Disk before deploy =="
            df -h
            docker system df || true

            echo "== Pull project =="
            if [ ! -d /app/.git ]; then
              git clone --depth 1 -b master https://github.com/Ishee11/poc.git /app
            else
              git -C /app fetch --depth 1 origin master
              git -C /app reset --hard origin/master
              git -C /app clean -fd
            fi
            cd /app
            test -f docker-compose.observability.yml
            test -f deploy/observability/prometheus/prometheus.prod.yml
            test -f deploy/observability/prometheus/alerts.yml
            test -f deploy/observability/alertmanager/alertmanager.yml

            echo "== Write observability env =="
            printf '%s\n' \
              "GF_SECURITY_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}" \
              "GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
              "GF_SERVER_DOMAIN=193.238.134.58" \
              "GF_SERVER_ROOT_URL=http://193.238.134.58:3001" \
              "GF_AUTH_ANONYMOUS_ENABLED=false" \
              "GF_USERS_ALLOW_SIGN_UP=false" \
              "PROMETHEUS_CONFIG_FILE=prometheus.prod.yml" \
              "PROMETHEUS_PORT_BIND=127.0.0.1:9091:9090" \
              "ALERTMANAGER_PORT_BIND=127.0.0.1:9094:9093" \
              "GRAFANA_PORT_BIND=3001:3000" \
              "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" \
              "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" \
              "TELEGRAM_SEND_RESOLVED=${{ secrets.TELEGRAM_SEND_RESOLVED }}" \
              > .env.observability
            chmod 600 .env.observability

            echo "== Write app env =="
            printf '%s\n' \
              "AUTH_SEED_ADMIN_EMAIL=${{ secrets.AUTH_SEED_ADMIN_EMAIL }}" \
              "AUTH_SEED_ADMIN_PASSWORD=${{ secrets.AUTH_SEED_ADMIN_PASSWORD }}" \
              "AUTH_SEED_USER_EMAIL=${{ secrets.AUTH_SEED_USER_EMAIL }}" \
              "AUTH_SEED_USER_PASSWORD=${{ secrets.AUTH_SEED_USER_PASSWORD }}" \
              "APP_ORIGIN=https://semenovv.space" \
              "PUSH_ENABLED=${{ secrets.PUSH_ENABLED }}" \
              "PUSH_SUBJECT=${{ secrets.PUSH_SUBJECT }}" \
              "PUSH_VAPID_PUBLIC_KEY=${{ secrets.PUSH_VAPID_PUBLIC_KEY }}" \
              "PUSH_VAPID_PRIVATE_KEY=${{ secrets.PUSH_VAPID_PRIVATE_KEY }}" \
              > .env.app
            chmod 600 .env.app

            echo "== Check docker cache pressure =="
            available_kb=$(df --output=avail / | tail -n 1 | tr -d ' ')
            min_available_kb=$((3 * 1024 * 1024))
            if [ "$available_kb" -lt "$min_available_kb" ]; then
              echo "Low disk space: ${available_kb}KB available. Pruning docker build cache."
              docker builder prune -af || true
            else
              echo "Keeping docker build cache: ${available_kb}KB available."
            fi

            echo "== Pre-pull build base image =="
            if ! docker image inspect golang:1.25.0-alpine >/dev/null 2>&1; then
              for i in 1 2 3 4 5; do
                if docker pull golang:1.25.0-alpine; then
                  break
                fi
                echo "Retrying build base pull..."
                sleep 5
              done
            fi

            echo "== Build & start prod containers =="
            docker compose --env-file .env.app -f docker-compose.yml up -d --build --force-recreate

            echo "== Wait for prod postgres =="
            for i in {1..10}; do
              if docker exec poker-db pg_isready -U poker; then
                echo "Prod postgres is ready"
                break
              fi
              echo "Waiting for prod postgres..."
              sleep 2
            done

            echo "== Check prod app logs =="
            sleep 3
            docker logs poker-app --tail=50

            echo "== Wait for prod app health =="
            for i in {1..20}; do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null; then
                echo "Prod app is healthy"
                break
              fi
              echo "Waiting for prod app health..."
              sleep 3
            done

            echo "== Start prod observability stack =="
            docker compose --env-file .env.observability -p poker-prod-obs -f docker-compose.observability.yml up -d

            echo "== Check prod observability containers =="
            docker compose --env-file .env.observability -p poker-prod-obs -f docker-compose.observability.yml ps

            echo "== Disk after deploy =="
            df -h
            docker system df || true

            echo "== Done =="
