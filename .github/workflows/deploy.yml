name: Deploy

on:
  push:
    branches: ["master"]  # или main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ← сюда

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            script: |
              rm -rf /app
              git clone https://github.com/Ishee11/poc.git /app
              cd /app
              docker compose up -d --build
