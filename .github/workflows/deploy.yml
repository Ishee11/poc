name: Deploy

on:
  push:
    branches: ["master"]  # или main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # ← сюда

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app
            git pull
            docker compose down
            docker compose build --no-cache
            docker compose up -d
