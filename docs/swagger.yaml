definitions:
  entity.AuthRole:
    enum:
    - admin
    - user
    type: string
    x-enum-varnames:
    - AuthRoleAdmin
    - AuthRoleUser
  entity.Currency:
    enum:
    - RUB
    - USD
    type: string
    x-enum-varnames:
    - CurrencyRUB
    - CurrencyUSD
  entity.OperationType:
    enum:
    - buy_in
    - cash_out
    - reversal
    type: string
    x-enum-varnames:
    - OperationBuyIn
    - OperationCashOut
    - OperationReversal
  entity.Status:
    enum:
    - active
    - finished
    type: string
    x-enum-varnames:
    - StatusActive
    - StatusFinished
  http.AccountPlayersResponse:
    properties:
      players:
        items:
          $ref: '#/definitions/http.PlayerDTO'
        type: array
    type: object
  http.AccountResponse:
    properties:
      players:
        items:
          $ref: '#/definitions/http.PlayerDTO'
        type: array
      user:
        $ref: '#/definitions/http.AuthUserResponse'
    type: object
  http.AuthUserResponse:
    properties:
      email:
        type: string
      id:
        type: string
      role:
        $ref: '#/definitions/entity.AuthRole'
    type: object
  http.BuyInRequest:
    properties:
      chips:
        example: 1000
        type: integer
      player_id:
        example: player-1
        type: string
      request_id:
        example: req-123
        type: string
      session_id:
        example: session-1
        type: string
    type: object
  http.CashOutRequest:
    properties:
      chips:
        example: 500
        type: integer
      player_id:
        example: player-1
        type: string
      request_id:
        example: req-123
        type: string
      session_id:
        example: session-1
        type: string
    type: object
  http.CreatePlayerRequest:
    properties:
      name:
        example: Alice
        type: string
      request_id:
        example: req-123
        type: string
    type: object
  http.CreatePlayerResponse:
    properties:
      player_id:
        example: player-123
        type: string
    type: object
  http.ErrorResponse:
    properties:
      details: {}
      error:
        type: string
      request_id:
        type: string
    type: object
  http.FinishSessionRequest:
    properties:
      request_id:
        type: string
      session_id:
        type: string
    type: object
  http.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  http.LoginResponse:
    properties:
      expires_at:
        type: string
      user:
        $ref: '#/definitions/http.AuthUserResponse'
    type: object
  http.MeResponse:
    properties:
      user:
        $ref: '#/definitions/http.AuthUserResponse'
    type: object
  http.PlayerDTO:
    properties:
      name:
        type: string
      player_id:
        type: string
    type: object
  http.RegisterRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  http.ReverseOperationRequest:
    properties:
      request_id:
        example: req-123
        type: string
      target_operation_id:
        example: op-456
        type: string
    type: object
  http.StartSessionRequest:
    properties:
      big_blind:
        type: integer
      chip_rate:
        type: integer
      currency:
        type: string
    type: object
  usecase.GetSessionResponse:
    properties:
      big_blind:
        type: integer
      chip_rate:
        type: integer
      created_at:
        type: string
      currency:
        $ref: '#/definitions/entity.Currency'
      finished_at:
        type: string
      session_id:
        type: string
      status:
        $ref: '#/definitions/entity.Status'
      total_buy_in:
        type: integer
      total_cash_out:
        type: integer
      total_chips:
        type: integer
    type: object
  usecase.OperationDTO:
    properties:
      chips:
        type: integer
      created_at:
        type: string
      id:
        type: string
      player_id:
        type: string
      reference_id:
        type: string
      type:
        $ref: '#/definitions/entity.OperationType'
    type: object
  usecase.PlayerCurrencyStat:
    properties:
      avg_profit_per_session:
        type: number
      currency:
        $ref: '#/definitions/entity.Currency'
      profit_money:
        type: integer
      roi_percent:
        type: number
      sessions_count:
        type: integer
      total_buy_in_money:
        type: integer
      total_cash_out_money:
        type: integer
    type: object
  usecase.PlayerDTO:
    properties:
      name:
        type: string
      player_id:
        type: string
    type: object
  usecase.PlayerOverallStat:
    properties:
      avg_buy_in_per_session:
        type: number
      avg_profit_per_session:
        type: number
      last_activity_at:
        type: string
      money_by_currency:
        items:
          $ref: '#/definitions/usecase.PlayerCurrencyStat'
        type: array
      player_id:
        type: string
      player_name:
        type: string
      profit_chips:
        type: integer
      profit_money:
        type: integer
      rank:
        $ref: '#/definitions/usecase.PlayerRank'
      roi_percent:
        type: number
      sessions_count:
        type: integer
      total_buy_in:
        type: integer
      total_buy_in_money:
        type: integer
      total_cash_out:
        type: integer
      total_cash_out_money:
        type: integer
    type: object
  usecase.PlayerRank:
    properties:
      code:
        type: string
      label:
        type: string
    type: object
  usecase.PlayerStat:
    properties:
      last_activity_at:
        type: string
      player_id:
        type: string
      player_name:
        type: string
      profit_chips:
        type: integer
      profit_money:
        type: integer
      rank:
        $ref: '#/definitions/usecase.PlayerRank'
      sessions_count:
        type: integer
      total_buy_in:
        type: integer
      total_cash_out:
        type: integer
    type: object
  usecase.SessionStat:
    properties:
      big_blind:
        type: integer
      chip_rate:
        type: integer
      created_at:
        type: string
      currency:
        $ref: '#/definitions/entity.Currency'
      finished_at:
        type: string
      player_count:
        type: integer
      session_id:
        type: string
      status:
        $ref: '#/definitions/entity.Status'
      total_buy_in:
        type: integer
      total_cash_out:
        type: integer
    type: object
info:
  contact: {}
paths:
  /account:
    get:
      description: Returns the authenticated user and linked players.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Current account
      tags:
      - account
  /account/players:
    delete:
      consumes:
      - application/json
      description: Links, unlinks, or lists players linked to the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountPlayersResponse'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Linked account players
      tags:
      - account
    get:
      consumes:
      - application/json
      description: Links, unlinks, or lists players linked to the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountPlayersResponse'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Linked account players
      tags:
      - account
    post:
      consumes:
      - application/json
      description: Links, unlinks, or lists players linked to the current user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountPlayersResponse'
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Linked account players
      tags:
      - account
  /account/players/available:
    get:
      description: Returns players that are not linked to any user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountPlayersResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Unlinked players
      tags:
      - account
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a system user and sets an HttpOnly session cookie.
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Login
      tags:
      - auth
  /auth/logout:
    post:
      description: Revokes the current auth session and clears the session cookie.
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: Logout
      tags:
      - auth
  /auth/me:
    get:
      description: Returns the authenticated system user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a regular user and sets an HttpOnly session cookie.
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.RegisterRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Register
      tags:
      - auth
  /operations:
    get:
      consumes:
      - application/json
      description: List operations for session
      parameters:
      - description: Session ID
        in: query
        name: session_id
        required: true
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/usecase.OperationDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get session operations
      tags:
      - operations
  /operations/buy-in:
    post:
      consumes:
      - application/json
      description: Add chips to session
      parameters:
      - description: Buy-in request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.BuyInRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Buy-in
      tags:
      - operations
  /operations/cash-out:
    post:
      consumes:
      - application/json
      description: Withdraw chips from session
      parameters:
      - description: Cash-out request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CashOutRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Cash out
      tags:
      - operations
  /operations/reverse:
    post:
      consumes:
      - application/json
      description: Reverses a target operation
      parameters:
      - description: Reverse request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.ReverseOperationRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Reverse operation
      tags:
      - operations
  /players:
    post:
      consumes:
      - application/json
      description: Creates a new player
      parameters:
      - description: Create player request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.CreatePlayerRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.CreatePlayerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Create player
      tags:
      - players
  /players/unlinked:
    get:
      description: Returns players that are not linked to any user.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/http.AccountPlayersResponse'
      summary: Unlinked players
      tags:
      - players
  /sessions:
    get:
      consumes:
      - application/json
      description: Get session by ID
      parameters:
      - description: Session ID
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.GetSessionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get session
      tags:
      - sessions
  /sessions/finish:
    post:
      consumes:
      - application/json
      description: Finish poker session (must be balanced)
      parameters:
      - description: Finish session request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.FinishSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Finish session
      tags:
      - sessions
  /sessions/players:
    get:
      consumes:
      - application/json
      description: Returns players in a session
      parameters:
      - description: Session ID
        in: query
        name: session_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/usecase.PlayerDTO'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get session players
      tags:
      - sessions
  /sessions/start:
    post:
      consumes:
      - application/json
      description: Create new poker session
      parameters:
      - description: start session request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/http.StartSessionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Start session
      tags:
      - sessions
  /stats/player:
    get:
      consumes:
      - application/json
      description: Returns overall statistics for a specific player
      parameters:
      - description: Player ID
        in: query
        name: player_id
        required: true
        type: string
      - description: From date (RFC3339 or YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: To date (RFC3339 or YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/usecase.PlayerOverallStat'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get player stats
      tags:
      - stats
  /stats/players:
    get:
      consumes:
      - application/json
      description: Returns aggregated statistics for players
      parameters:
      - description: Limit (default 20)
        in: query
        name: limit
        type: integer
      - description: From date (RFC3339 or YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: To date (RFC3339 or YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/usecase.PlayerStat'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get players stats
      tags:
      - stats
  /stats/sessions:
    get:
      consumes:
      - application/json
      description: Returns statistics for sessions (aggregated)
      parameters:
      - description: Limit (default 20)
        in: query
        name: limit
        type: integer
      - description: From date (RFC3339 or YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: To date (RFC3339 or YYYY-MM-DD)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/usecase.SessionStat'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/http.ErrorResponse'
      summary: Get sessions stats
      tags:
      - stats
swagger: "2.0"
