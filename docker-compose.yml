version: "3.9"

services:
  db:
    image: postgres:16
    container_name: poker-db
    restart: always
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build: .
    container_name: poker-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://poker:poker@db:5432/poker?sslmode=disable
      LOG_LEVEL: info
      HTTP_ACCESS_LOG: errors
      AUTH_ENABLED: "false"
      AUTH_COOKIE_SECURE: "true"
      AUTH_SESSION_TTL: 12h
      AUTH_IDLE_TTL: 2h
      AUTH_SEED_ADMIN_EMAIL: ${AUTH_SEED_ADMIN_EMAIL:-}
      AUTH_SEED_ADMIN_PASSWORD: ${AUTH_SEED_ADMIN_PASSWORD:-}
      AUTH_SEED_USER_EMAIL: ${AUTH_SEED_USER_EMAIL:-}
      AUTH_SEED_USER_PASSWORD: ${AUTH_SEED_USER_PASSWORD:-}
      APP_ORIGIN: http://193.238.134.58:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
