services:
  db:
    image: postgres:18
    container_name: poker-db-dev
    restart: always
    environment:
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker
      POSTGRES_DB: poker
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:15432:5432"

  app:
    build: .
    container_name: poker-app-dev
    restart: always
    depends_on:
      - db
    ports:
      - "18080:8080"
    environment:
      DATABASE_URL: postgres://poker:poker@db:5432/poker?sslmode=disable
      LOG_LEVEL: debug
      HTTP_ACCESS_LOG: errors
      AUTH_ENABLED: "false"
      AUTH_COOKIE_SECURE: "false"
      AUTH_SESSION_TTL: 24h
      AUTH_IDLE_TTL: 8h
      AUTH_SEED_ADMIN_EMAIL: ${AUTH_SEED_ADMIN_EMAIL:-}
      AUTH_SEED_ADMIN_PASSWORD: ${AUTH_SEED_ADMIN_PASSWORD:-}
      APP_ORIGIN: http://193.238.134.58:18080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data_dev:
